<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Host Agent Dashboard</title>
    <style>
      :root {
        --bg: #020617;
        --card: #0f172a;
        --primary: #3b82f6;
        --text: #f8fafc;
        --text-dim: #94a3b8;
        --emerald: #10b981;
      }
      body {
        margin: 0;
        font-family: 'Inter', -apple-system, sans-serif;
        background-color: var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
      }
      .dashboard {
        width: 100%;
        max-width: 320px;
        padding: 24px;
        background: var(--card);
        border-radius: 16px;
        border: 1px solid rgba(255,255,255,0.05);
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
      }
      .header h1 {
        font-size: 14px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin: 0;
        color: var(--text-dim);
      }
      .status-pill {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.05);
        border-radius: 99px;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
      }
      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #ef4444;
      }
      .dot.active {
        background: var(--emerald);
        box-shadow: 0 0 8px var(--emerald);
      }
      .control-panel {
        background: rgba(255,255,255,0.02);
        padding: 16px;
        border-radius: 12px;
        margin-bottom: 12px;
      }
      .toggle-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .toggle-label {
        font-size: 13px;
        font-weight: 500;
      }
      .switch {
        position: relative;
        display: inline-block;
        width: 44px;
        height: 24px;
      }
      .switch input { opacity: 0; width: 0; height: 0; }
      .slider {
        position: absolute;
        cursor: pointer;
        top: 0; left: 0; right: 0; bottom: 0;
        background-color: #334155;
        transition: .4s;
        border-radius: 34px;
      }
      .slider:before {
        position: absolute;
        content: "";
        height: 18px; width: 18px;
        left: 3px; bottom: 3px;
        background-color: white;
        transition: .4s;
        border-radius: 50%;
      }
      input:checked + .slider { background-color: var(--primary); }
      input:checked + .slider:before { transform: translateX(20px); }
      
      .info-row {
        font-size: 11px;
        color: var(--text-dim);
        margin-top: 16px;
        text-align: center;
      }
      #status-msg {
        font-weight: 600;
        color: var(--text);
        display: block;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <div class="dashboard">
      <div class="header">
        <h1>Control</h1>
        <div class="status-pill">
          <div id="status-dot" class="dot"></div>
          <span id="status-text">Ready</span>
        </div>
      </div>

      <div class="control-panel">
        <div class="toggle-row">
          <span class="toggle-label">Remote Control</span>
          <label class="switch">
            <input type="checkbox" id="control-toggle">
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <div class="info-row">
        Connection Status
        <span id="status-msg">Searching for host...</span>
      </div>
    </div>
    
    <script>
      const { ipcRenderer } = require('electron');
      const io = require('socket.io-client');
      const SimplePeer = require('simple-peer');

      const socket = io('http://localhost:3000');
      let peer;
      let localStream;
      const roomId = 'default-room';

      const controlToggle = document.getElementById('control-toggle');
      const statusText = document.getElementById('status-text');
      const statusDot = document.getElementById('status-dot');
      const statusMsg = document.getElementById('status-msg');

      socket.emit('join-room', roomId);
      console.log('[Agent] Attempting to join room:', roomId);

      // Update control state in main process
      controlToggle.addEventListener('change', (e) => {
        ipcRenderer.send('update-permissions', { allowControl: e.target.checked });
      });

      function updateStatus(text, isActive = false) {
        statusMsg.innerText = text;
        if (isActive) {
          statusDot.classList.add('active');
          statusText.innerText = 'Online';
        } else {
          statusDot.classList.remove('active');
          statusText.innerText = 'Ready';
        }
      }

      socket.on('connect', () => {
        console.log('[Agent] Socket connected! Joining room:', roomId);
        socket.emit('join-room', roomId);
      });

      ipcRenderer.on('set-source', async (event, sourceId) => {
        try {
          localStream = await navigator.mediaDevices.getUserMedia({
            audio: false,
            video: {
              mandatory: {
                chromeMediaSource: 'desktop',
                chromeMediaSourceId: sourceId
              }
            }
          });
          updateStatus('Secure Session Active');
          console.log('[Agent] Media captured, awaiting viewer signal...');
        } catch (e) {
          console.error('Stream Setup Error:', e);
          updateStatus('Capture Failed');
        }
      });

      socket.on('viewer-ready', () => {
        console.log('[Agent] Viewer is ready. Starting WebRTC...');
        initPeer();
      });

      function initPeer() {
        if (!localStream) return;
        if (peer) {
          console.log('[Agent] Destroying existing peer before reconnect...');
          peer.destroy();
        }
        
        updateStatus('Negotiating NAT...');

        peer = new SimplePeer({
          initiator: true,
          stream: localStream,
          trickle: true,
          config: { 
            iceServers: [
              { urls: 'stun:stun.l.google.com:19302' }
            ]
          }
        });

        peer.on('signal', data => {
          socket.emit('signal', data);
        });

        peer.on('connect', () => {
          updateStatus('Streaming Live', true);
          console.log('[Agent] WebRTC Connected!');
        });

        peer.on('error', err => {
          console.error('Peer error:', err);
          updateStatus('Signal Failure');
        });

        peer.on('close', () => {
          console.log('[Agent] Peer connection closed');
          updateStatus('Peer Closed');
        });
      }

      socket.on('signal', data => {
        if (peer && !peer.destroyed) {
          try {
            peer.signal(data);
          } catch (e) {
            console.error('[Agent] Signal error:', e);
          }
        }
      });

      // Relay input control events to main process
      socket.on('mouse-move', data => {
        ipcRenderer.send('mouse-move', data);
      });

      socket.on('mouse-click', data => {
        ipcRenderer.send('mouse-click', data);
      });

      socket.on('key-event', data => {
        ipcRenderer.send('key-event', data);
      });
    </script>
  </body>
</html>
